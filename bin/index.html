<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kick Shrew - 打地鼠</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="js/libs/laya.core.js"></script>
    <script src="js/libs/laya.webgl_2D.js"></script>
    <script src="js/libs/laya.ui2.js"></script>
    <script src="js/game.js"></script>
    <script>
        if (!Laya.PlayerConfig) Laya.PlayerConfig = {};
        if (!Laya.PlayerConfig.UI) Laya.PlayerConfig.UI = {};

        Laya.init(960, 640).then(function() {
            Laya.stage.scaleMode = Laya.Stage.SCALE_FIXED_AUTO;
            Laya.stage.bgColor = "#222222";

            var main = new Game.Main();
            if (main.onStart) main.onStart();

            // MOUSE_DOWN 事件已在 Main.ts onStart 中注册，此处不再重复

            console.log("KickShrew game running!");
        }).catch(function(err) {
            console.error("Init failed:", err);
        });
    </script>
</body>
</html>
