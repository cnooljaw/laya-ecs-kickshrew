<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kick Shrew - 打地鼠</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        canvas { display: block; }
        #debug { position: absolute; top: 0; left: 0; color: #0f0; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.5); padding: 4px; }
    </style>
</head>
<body>
    <div id="debug"></div>
    <script src="js/libs/laya.core.js"></script>
    <script src="js/libs/laya.webgl_2D.js"></script>
    <script src="js/libs/laya.ui2.js"></script>
    <script src="js/game.js"></script>
    <script>
        if (!Laya.PlayerConfig) Laya.PlayerConfig = {};
        if (!Laya.PlayerConfig.UI) Laya.PlayerConfig.UI = {};

        var debug = document.getElementById("debug");
        function dbg(msg) {
            console.log(msg);
            var line = document.createElement("div");
            line.textContent = msg;
            debug.appendChild(line);
        }

        Laya.init(750, 1334).then(function() {
            Laya.stage.scaleMode = Laya.Stage.SCALE_FIXED_WIDTH;
            Laya.stage.bgColor = "#333333";

            dbg("init OK");
            var main = new Game.Main();
            dbg("main created");
            if (main.onStart) {
                main.onStart();
                dbg("onStart done");
            }

            // Frame counter
            var frameCount = 0;
            Laya.timer.loop(1000, null, function() {
                dbg("fps: " + frameCount);
                frameCount = 0;
            });
            Laya.timer.frameLoop(1, null, function() {
                frameCount++;
            });

            Laya.stage.on(Laya.Event.MOUSE_DOWN, null, function() {
                if (main._onTouch) main._onTouch();
            });
            dbg("READY - click/tap to play");
        }).catch(function(err) {
            dbg("ERR: " + (err.message || String(err)));
        });
    </script>
</body>
</html>
