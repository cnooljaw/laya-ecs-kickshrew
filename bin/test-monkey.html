<!DOCTYPE html>
<html>
<head><title>Test Monkey</title></head>
<body>
<script src="js/libs/laya.core.js"></script>
<script src="js/libs/laya.webgl_2D.js"></script>
<script>
    var out = [];
    function log(msg) { out.push(msg); }

    // Monkey-patch createEngine to see what's happening
    var orig = Laya.LayaGL.renderDeviceFactory;
    log("before init - renderDeviceFactory: " + (Laya.LayaGL.renderDeviceFactory ? "exists" : "null"));

    // Also intercept the step that fails
    var realLayaGL = Laya.LayaGL;
    log("LayaGL keys: " + Object.keys(realLayaGL).slice(0,10).join(", "));

    Laya.init(750, 1334).then(function() {
        log("INIT OK");
        log("renderDeviceFactory after: " + (Laya.LayaGL.renderDeviceFactory ? "exists" : "null"));
        document.body.innerHTML = "<pre>" + out.join("\n") + "</pre>";
    }).catch(function(err) {
        log("INIT FAIL: " + (err.message || String(err)));
        log("renderDeviceFactory at fail: " + (Laya.LayaGL.renderDeviceFactory ? "exists" : "null"));
        document.body.innerHTML = "<pre>" + out.join("\n") + "</pre>";
    });
</script>
</body>
</html>
