<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kick Shrew - 打地鼠</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="js/libs/laya.core.js"></script>
    <script src="js/libs/laya.webgl_2D.js"></script>
    <script src="js/libs/laya.ui2.js"></script>
    <script src="js/game.js"></script>
    <script>
        var out = [];
        function log(msg) { out.push(msg); console.log(msg); }
        function errLog(msg) { out.push("ERR: " + msg); console.error(msg); }
        log("start");

        // Fix missing PlayerConfig that LayaAirIDE normally sets up
        if (!Laya.PlayerConfig) Laya.PlayerConfig = {};
        if (!Laya.PlayerConfig.UI) Laya.PlayerConfig.UI = {};

        try {
            Laya.init(750, 1334).then(function() {
                log("init OK");
                log("stage=" + (Laya.stage ? "yes" : "no"));
                Laya.stage.scaleMode = Laya.Stage.SCALE_FIXED_WIDTH;
                Laya.stage.bgColor = "#333333";
                var main = new Game.Main();
                log("main OK");
                if (main.onStart) { main.onStart(); log("start OK"); }
                log("DONE");
                document.body.innerHTML = "<pre style=color:#0f0;font-family:monospace>" + out.join("\n") + "</pre>";
            }).catch(function(err) {
                errLog("init: " + (err.message || String(err)));
                document.body.innerHTML = "<pre style=color:#f00;font-family:monospace>" + out.join("\n") + "</pre>";
            });
        } catch(e) {
            errLog("exc: " + e.message);
            document.body.innerHTML = "<pre style=color:#f00;font-family:monospace>" + out.join("\n") + "</pre>";
        }
    </script>
</body>
</html>
