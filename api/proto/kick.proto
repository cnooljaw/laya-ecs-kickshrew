syntax = "proto3";

package kick.v1;

option go_package = "goserveractorfsm/internal/protocol/pb;kickpb";

message Envelope {
  uint32 seq_id = 1;
  string cmd = 2;
  bytes payload = 3;
}

message KickRequest {
  string cmd = 1;
  int32 hammer_type = 2;
  bool kick_shrew = 3;
  int32 num_of_shrew = 4;
  repeated KickShrew shrews = 5;
  int32 combo_id = 6;
}

message KickShrew {
  int32 shrew_index = 1;
  int32 protect_type = 2;
}

message KickResponse {
  string cmd = 1;
  int32 ret = 2;
  int32 money = 3;
  int32 angry = 4;
  int32 power = 5;
  int32 level_score = 6;
  int32 hammer_id = 7;
  int32 num_of_shrew = 8;
  repeated ShrewReward shrew_resp = 9;
  int32 combo = 10;
  int32 combo_id = 11;
}

message ShrewReward {
  int32 shrew_index = 1;
  int32 reward = 2;
}

message ErrorResponse {
  string cmd = 1;
  int32 code = 2;
  string message = 3;
}

message Ping {
  string cmd = 1;
}

message Pong {
  string cmd = 1;
}
